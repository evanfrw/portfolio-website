<title>Sign in — Evan Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --paper:   #FAFAFB;
    --panel:   #F2F3F5;
    --ink:     #16171B;
    --muted:   #6B6F77;
    --hair:    #E4E6EA;
    --accent:  #1F3BDE;
    --accent-ink:#5B72F2;
    --on-accent:#FFFFFF;
    --field-bg:#FFFFFF;
    --danger:#D6453C;

    --font-sans: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    --font-mono: ui-monospace, "Cascadia Code", "SF Mono", Consolas, "Liberation Mono", monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper:#0F1013; --panel:#17191D; --ink:#EFEEE9; --muted:#969AA2;
      --hair:#262A30; --accent:#6E84FF; --accent-ink:#6E84FF; --on-accent:#0F1013;
      --field-bg:#141619; --danger:#F0776E;
    }
  }
  :root[data-theme="dark"]{
    --paper:#0F1013; --panel:#17191D; --ink:#EFEEE9; --muted:#969AA2;
    --hair:#262A30; --accent:#6E84FF; --accent-ink:#6E84FF; --on-accent:#0F1013;
    --field-bg:#141619; --danger:#F0776E;
  }
  :root[data-theme="light"]{
    --paper:#FAFAFB; --panel:#F2F3F5; --ink:#16171B; --muted:#6B6F77;
    --hair:#E4E6EA; --accent:#1F3BDE; --accent-ink:#5B72F2; --on-accent:#FFFFFF;
    --field-bg:#FFFFFF; --danger:#D6453C;
  }

  * { box-sizing: border-box; }
  @media (prefers-reduced-motion: reduce){ *,*::before,*::after{ animation-duration:.001ms!important; transition-duration:.001ms!important; } }
  html,body{ height:100%; }
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:var(--font-sans); -webkit-font-smoothing:antialiased;
  }
  ::selection{ background:var(--accent); color:var(--on-accent); }
  :focus-visible{ outline:2px solid var(--accent); outline-offset:2px; border-radius:6px; }
  .mono{ font-family:var(--font-mono); }

  .shell{ display:grid; grid-template-columns:1.05fr 1fr; min-height:100vh; }
  @media (max-width: 860px){ .shell{ grid-template-columns:1fr; } }

  /* ---------- brand panel ---------- */
  .brand{
    position:relative; background:var(--accent); color:var(--on-accent);
    padding:48px; display:flex; flex-direction:column; justify-content:space-between; overflow:hidden;
  }
  @media (max-width: 860px){ .brand{ display:none; } }
  .brand .grid-bg{ position:absolute; inset:0; opacity:.14;
    background-image:linear-gradient(var(--on-accent) 1px, transparent 1px), linear-gradient(90deg, var(--on-accent) 1px, transparent 1px);
    background-size:64px 64px; mask-image:radial-gradient(circle at 30% 20%, black, transparent 78%); }
  .brand .logo{ position:relative; display:flex; align-items:center; gap:12px; font-weight:600; font-size:1.05rem; letter-spacing:-.01em; }
  .brand .logo .dot{ width:11px; height:11px; border-radius:50%; background:var(--on-accent); display:inline-block; }
  .brand .mid{ position:relative; }
  .brand .eyebrow{ font-family:var(--font-mono); font-size:12px; letter-spacing:.18em; text-transform:uppercase; opacity:.7; }
  .brand h2{ margin:16px 0 0; font-size:clamp(1.8rem, 3.4vw, 2.9rem); line-height:1.05; letter-spacing:-.03em; font-weight:600; max-width:14ch; text-wrap:balance; }
  .brand .sub{ margin-top:18px; opacity:.78; max-width:34ch; line-height:1.55; }
  .brand .foot{ position:relative; display:flex; gap:22px; font-family:var(--font-mono); font-size:12px; opacity:.7; }
  .brand .foot span::before{ content:"↗ "; }

  /* ---------- form side ---------- */
  .side{ display:flex; align-items:center; justify-content:center; padding:40px 24px; position:relative; }
  .themebtn{
    position:absolute; top:22px; right:24px; font-family:var(--font-mono); font-size:11px; letter-spacing:.08em;
    color:var(--muted); background:none; border:1px solid var(--hair); border-radius:999px; padding:6px 12px; cursor:pointer; transition:.2s;
  }
  .themebtn:hover{ color:var(--ink); border-color:var(--muted); }

  .card{ width:100%; max-width:392px; }
  .card .eyebrow{ font-family:var(--font-mono); font-size:12px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); }
  .card h1{ margin:12px 0 8px; font-size:2rem; letter-spacing:-.025em; font-weight:600; }
  .card .lede{ margin:0 0 30px; color:var(--muted); font-size:.98rem; }

  form{ display:flex; flex-direction:column; gap:18px; }
  .field{ display:flex; flex-direction:column; gap:8px; }
  .field label{ font-family:var(--font-mono); font-size:11.5px; letter-spacing:.06em; text-transform:uppercase; color:var(--muted); display:flex; justify-content:space-between; align-items:center; }
  .field label a{ text-transform:none; letter-spacing:0; color:var(--accent-ink); font-size:12px; text-decoration:none; }
  .field label a:hover{ text-decoration:underline; }
  .inputwrap{ position:relative; display:flex; align-items:center; }
  .field input{
    width:100%; font-family:var(--font-sans); font-size:15px; color:var(--ink);
    background:var(--field-bg); border:1px solid var(--hair); border-radius:10px;
    padding:13px 14px; transition:border-color .18s, box-shadow .18s;
  }
  .field input::placeholder{ color:var(--muted); opacity:.7; }
  .field input:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent); }
  .reveal{ position:absolute; right:6px; border:none; background:none; color:var(--muted); font-family:var(--font-mono); font-size:11px; letter-spacing:.04em; padding:6px 8px; cursor:pointer; border-radius:6px; }
  .reveal:hover{ color:var(--ink); }

  .row{ display:flex; align-items:center; justify-content:space-between; margin-top:-2px; }
  .check{ display:flex; align-items:center; gap:9px; color:var(--muted); font-size:13.5px; cursor:pointer; user-select:none; }
  .check input{ width:16px; height:16px; accent-color:var(--accent); }

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:9px;
    font-size:15px; font-weight:550; padding:14px 18px; border-radius:10px; border:1px solid var(--ink);
    background:var(--ink); color:var(--paper); cursor:pointer; transition:transform .14s, background .2s, border-color .2s, color .2s;
  }
  .btn .arw{ transition:transform .2s; }
  .btn:hover{ background:var(--accent); border-color:var(--accent); color:var(--on-accent); }
  .btn:hover .arw{ transform:translateX(3px); }
  .btn:active{ transform:translateY(1px); }

  .divider{ display:flex; align-items:center; gap:14px; color:var(--muted); font-family:var(--font-mono); font-size:11px; letter-spacing:.14em; }
  .divider::before,.divider::after{ content:""; height:1px; flex:1; background:var(--hair); }

  .socials{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .sbtn{
    display:inline-flex; align-items:center; justify-content:center; gap:9px; font-size:14px; font-weight:500;
    padding:12px; border:1px solid var(--hair); border-radius:10px; background:var(--field-bg); color:var(--ink); cursor:pointer; transition:border-color .18s, background .18s;
  }
  .sbtn:hover{ border-color:var(--muted); }
  .sbtn svg{ width:17px; height:17px; }

  .signup{ margin-top:26px; text-align:center; color:var(--muted); font-size:14px; }
  .signup a{ color:var(--accent-ink); font-weight:550; text-decoration:none; }
  .signup a:hover{ text-decoration:underline; }
</style>

<div class="shell">
  <!-- LEFT: brand -->
  <aside class="brand">
    <div class="grid-bg" aria-hidden="true"></div>
    <div class="logo"><span class="dot"></span> Evan Studio</div>
    <div class="mid">
      <div class="eyebrow">Design workspace</div>
      <h2>Where ideas become interfaces.</h2>
      <p class="sub">Masuk untuk melanjutkan proyek, mengelola design system, dan berkolaborasi dengan timmu.</p>
    </div>
    <div class="foot"><span>Portfolio</span><span>Dribbble</span><span>Docs</span></div>
  </aside>

  <!-- RIGHT: form -->
  <main class="side">
    <button class="themebtn" id="themebtn" aria-label="Toggle theme">THEME</button>
    <div class="card">
      <div class="eyebrow">Welcome back</div>
      <h1>Sign in</h1>
      <p class="lede">Masuk ke akun Evan Studio-mu untuk lanjut bekerja.</p>

      <form id="loginform" novalidate>
        <div class="field">
          <label for="email">Email</label>
          <div class="inputwrap">
            <input id="email" name="email" type="email" inputmode="email" autocomplete="email" placeholder="nama@email.com" required>
          </div>
        </div>

        <div class="field">
          <label for="password">Password <a href="#" tabindex="0">Lupa password?</a></label>
          <div class="inputwrap">
            <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required>
            <button type="button" class="reveal" id="reveal" aria-label="Tampilkan password">SHOW</button>
          </div>
        </div>

        <label class="check"><input type="checkbox" id="remember"> Ingat saya di perangkat ini</label>

        <button class="btn" type="submit">Sign in <span class="arw">→</span></button>
      </form>

      <div class="divider" style="margin:24px 0;">OR</div>

      <div class="socials">
        <button class="sbtn" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#EA4335" d="M12 10.2v3.9h5.5c-.24 1.4-1.7 4.1-5.5 4.1-3.3 0-6-2.7-6-6s2.7-6 6-6c1.9 0 3.1.8 3.8 1.5l2.6-2.5C16.9 2.9 14.7 2 12 2 6.9 2 2.8 6.1 2.8 12S6.9 22 12 22c5.5 0 9.1-3.9 9.1-9.3 0-.6-.06-1-.15-1.5H12z"/></svg>
          Google
        </button>
        <button class="sbtn" type="button">
          <svg viewBox="0 0 24 24" aria-hidden="true" fill="currentColor"><path d="M16.4 12.9c0-2.3 1.9-3.4 2-3.5-1.1-1.6-2.8-1.8-3.4-1.8-1.4-.15-2.8.85-3.5.85-.7 0-1.85-.83-3-.8-1.55.02-3 .9-3.8 2.3-1.6 2.8-.4 7 1.15 9.3.76 1.1 1.66 2.35 2.85 2.3 1.15-.05 1.58-.74 2.97-.74 1.38 0 1.77.74 2.98.72 1.23-.02 2-1.12 2.75-2.23.87-1.27 1.22-2.5 1.24-2.56-.03-.01-2.38-.91-2.4-3.63zM14.1 5.9c.63-.77 1.06-1.83.94-2.9-.91.04-2.01.61-2.67 1.37-.59.67-1.1 1.75-.96 2.78 1.02.08 2.06-.52 2.69-1.25z"/></svg>
          Apple
        </button>
      </div>

      <p class="signup">Belum punya akun? <a href="#">Buat akun</a></p>
    </div>
  </main>
</div>

<script>
  (function(){
    var btn=document.getElementById('themebtn');
    function cur(){ var s=document.documentElement.getAttribute('data-theme'); return s?s:(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'); }
    btn.addEventListener('click',function(){ var n=cur()==='dark'?'light':'dark'; document.documentElement.setAttribute('data-theme',n); btn.textContent=n==='dark'?'LIGHT':'DARK'; });
  })();
  (function(){
    var rev=document.getElementById('reveal'), pw=document.getElementById('password');
    rev.addEventListener('click',function(){ var show=pw.type==='password'; pw.type=show?'text':'password'; rev.textContent=show?'HIDE':'SHOW'; pw.focus(); });
  })();
  (function(){
    var f=document.getElementById('loginform');
    f.addEventListener('submit',function(e){ e.preventDefault();
      var b=f.querySelector('.btn'); var t=b.innerHTML; b.innerHTML='Signing in…'; b.disabled=true;
      setTimeout(function(){ b.innerHTML=t; b.disabled=false; }, 1400);
    });
  })();
</script>
